interface:
  display_name: "DevBuddy"
  short_description: "Plan-first engineering workflow for code changes"
  default_prompt: "Use $devbuddy to understand, plan, and implement a maintainable coding change."
routing:
  orchestrator: "skill/SKILL.md"
  conditional_memory:
    description: "Load project memory only when the task needs project-specific technical context, business rules, prior decisions, or reusable lessons."
    files:
      - "skill/Context.md"
      - "skill/BusinessContext.md"
      - "skill/DecisionLog.md"
      - "skill/KnowledgeBase.md"
  profiles:
    analyze:
      description: "Read-only project, code, test, business, and risk analysis before implementation."
      shared_spec: "skill/agents/shared/analyze.md"
      codex_adapter: "skill/agents/codex/analyze.md"
      claude_adapter: ".claude/agents/devbuddy-analyze.md"
      default_mode: "read-only"
      use_when:
        - "The user asks to analyze, understand, inspect, review scope, identify risks, or create a plan before edits."
        - "The task needs repository exploration without implementation."
    frontend:
      description: "Frontend and Angular implementation or review with accessibility, state, styling, visual behavior, and tests."
      shared_spec: "skill/agents/shared/frontend.md"
      codex_adapter: "skill/agents/codex/frontend.md"
      claude_adapter: ".claude/agents/devbuddy-frontend.md"
      default_mode: "implementation-with-approval"
      use_when:
        - "The task involves UI, Angular, components, routing, forms, state, styling, accessibility, responsive behavior, or frontend tests."
    backend:
      description: "Backend and .NET implementation or review with API, data, runtime, diagnostics, security, performance, and tests."
      shared_spec: "skill/agents/shared/backend.md"
      codex_adapter: "skill/agents/codex/backend.md"
      claude_adapter: ".claude/agents/devbuddy-backend.md"
      default_mode: "implementation-with-approval"
      use_when:
        - "The task involves .NET, ASP.NET Core, Web API, EF Core, persistence, runtime configuration, diagnostics, security, performance, or backend tests."
    qa:
      description: "Quality review, regression risk analysis, test-gap discovery, acceptance checks, and verification strategy."
      shared_spec: "skill/agents/shared/qa.md"
      codex_adapter: "skill/agents/codex/qa.md"
      claude_adapter: ".claude/agents/devbuddy-qa.md"
      default_mode: "read-only"
      use_when:
        - "The task needs post-change QA review, regression analysis, missing-test discovery, acceptance checks, or verification planning."
        - "The task is medium or high risk and needs focused quality findings before final delivery."
    operations:
      description: "Explicitly requested operations, DevOps, infrastructure, CI/CD, Docker, release, deployment, hosting, runtime environment, and operational readiness work."
      shared_spec: "skill/agents/shared/operations.md"
      codex_adapter: "skill/agents/codex/operations-profile.md"
      claude_adapter: ".claude/agents/devbuddy-operations.md"
      default_mode: "implementation-with-approval"
      use_when:
        - "Use only when the user explicitly asks for operations, DevOps, infrastructure, release, deployment, hosting, CI/CD, Docker, runtime environment, or operational readiness help."
        - "Do not use for generic build failures, test failures, backend configuration, scripts, Dockerfiles, or deployment-adjacent files unless the user's request clearly names an operations intent."
    docs:
      description: "Documentation implementation or review for README files, usage guides, migration notes, changelogs, skill docs, adapters, and consistency."
      shared_spec: "skill/agents/shared/docs.md"
      codex_adapter: "skill/agents/codex/docs.md"
      claude_adapter: ".claude/agents/devbuddy-docs.md"
      default_mode: "implementation-with-approval"
      use_when:
        - "The task involves documentation as the main deliverable or documentation consistency after code, workflow, skill, or adapter changes."
    data:
      description: "Data-focused implementation or review for models, schemas, migrations, ownership, query behavior, compatibility, and integrity."
      shared_spec: "skill/agents/shared/data.md"
      codex_adapter: "skill/agents/codex/data.md"
      claude_adapter: ".claude/agents/devbuddy-data.md"
      default_mode: "implementation-with-approval"
      use_when:
        - "The task involves data models, schemas, migrations, seed data, backfills, imports, exports, retention, data ownership, query behavior, compatibility, or data integrity."
